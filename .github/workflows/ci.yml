name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

env:
  FALLBACK_RUNNER_LABEL: ubuntu-latest
  SELF_HOSTED_RUNNER_LABELS: '["self-hosted","Linux","X64"]'

jobs:
  select-runner:
    name: Select runner
    runs-on: ubuntu-latest
    outputs:
      runner_labels: ${{ steps.select.outputs.runner_labels }}
    steps:
      - name: Prefer idle self-hosted runner
        id: select
        uses: actions/github-script@v9
        env:
          RUNNER_SELECTOR_TOKEN_AVAILABLE: ${{ secrets.RUNNER_SELECTOR_TOKEN != '' }}
        with:
          github-token: ${{ secrets.RUNNER_SELECTOR_TOKEN || github.token }}
          script: |
            const selfHostedLabels = JSON.parse(process.env.SELF_HOSTED_RUNNER_LABELS)
            const fallbackRunner = process.env.FALLBACK_RUNNER_LABEL
            let selectedRunnerJson = JSON.stringify(fallbackRunner)

            if (context.eventName === "pull_request") {
              core.info(`Pull request CI always uses ${fallbackRunner}.`)
              core.setOutput("runner_labels", selectedRunnerJson)
              return
            }

            if (process.env.RUNNER_SELECTOR_TOKEN_AVAILABLE !== "true") {
              core.info("RUNNER_SELECTOR_TOKEN is not configured; using the hosted fallback runner.")
              core.setOutput("runner_labels", selectedRunnerJson)
              return
            }

            try {
              const runners = await github.paginate(
                github.rest.actions.listSelfHostedRunnersForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  per_page: 100,
                }
              )

              const hasMatchingIdleRunner = runners.some((runner) => {
                const labels = new Set((runner.labels || []).map((label) => label.name))
                return (
                  runner.status === "online" &&
                  runner.busy === false &&
                  selfHostedLabels.every((label) => labels.has(label))
                )
              })

              if (hasMatchingIdleRunner) {
                selectedRunnerJson = JSON.stringify(selfHostedLabels)
                core.info(`Selected self-hosted runner labels ${selfHostedLabels.join(", ")}.`)
              } else {
                core.info(
                  `No idle self-hosted runner with labels ${selfHostedLabels.join(", ")} was found; falling back to ${fallbackRunner}.`
                )
              }
            } catch (error) {
              core.warning(
                `Could not inspect self-hosted runners; falling back to ${fallbackRunner}. ${error.message}`
              )
            }

            core.setOutput("runner_labels", selectedRunnerJson)

  build-test:
    needs: select-runner
    runs-on: ${{ fromJSON(needs.select-runner.outputs.runner_labels) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-fund --no-audit --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Security audit (runtime deps)
        run: npm run audit:npm

      - name: Build
        run: npm run build --if-present

      - name: Test with coverage
        run: |
          set -euo pipefail

          if node -e "const s=(require('./package.json').scripts||{})['test:coverage']||''; process.exit(s.includes('vitest') ? 0 : 1)"; then
            npm run test:coverage -- --coverage.reporter=lcov --coverage.reporter=text-summary
          elif node -e "const s=(require('./package.json').scripts||{})['test:coverage']||''; process.exit(s ? 0 : 1)"; then
            npm run test:coverage
          elif node -e "const s=(require('./package.json').scripts||{}).test||''; process.exit(s.includes('vitest') ? 0 : 1)"; then
            npm run test -- --coverage --coverage.reporter=lcov --coverage.reporter=text-summary
          else
            npm run test -- --coverage
          fi

      - name: Locate coverage report
        run: |
          set -euo pipefail
          LCOV_FILE="$(find coverage -type f -name lcov.info | head -n 1 || true)"
          if [ -z "$LCOV_FILE" ]; then
            echo "No lcov.info found under coverage/."
            exit 1
          fi
          echo "Using coverage report: $LCOV_FILE"
          echo "LCOV_FILE=$LCOV_FILE" >> "$GITHUB_ENV"

      - name: Enforce line coverage >= 80%
        run: |
          set -euo pipefail
          if [ -z "${LCOV_FILE:-}" ] || [ ! -f "$LCOV_FILE" ]; then
            echo "Missing coverage report: ${LCOV_FILE:-unset}"
            exit 1
          fi

          read -r LF LH <<EOF
          $(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{printf "%d %d\n", lf+0, lh+0}' "$LCOV_FILE")
          EOF

          if [ "$LF" -le 0 ]; then
            echo "Invalid coverage totals (LF=$LF, LH=$LH)"
            exit 1
          fi

          PCT=$(awk -v lh="$LH" -v lf="$LF" 'BEGIN{printf "%.2f", (lh/lf)*100}')
          echo "Line coverage: ${PCT}% (${LH}/${LF})"

          awk -v pct="$PCT" 'BEGIN{exit(pct >= 80 ? 0 : 1)}' || {
            echo "Coverage gate failed: ${PCT}% < 80%"
            exit 1
          }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.LCOV_FILE }}
          flags: unittests
          fail_ci_if_error: true
          slug: ${{ github.repository }}
